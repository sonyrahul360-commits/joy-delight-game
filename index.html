<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Joy Delight Game</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        #game-board {\n            width: 300px;\n            height: 300px;\n            border: 2px solid #000;\n            display: grid;\n            grid-template-columns: repeat(3, 1fr);\n            grid-template-rows: repeat(3, 1fr);\n            margin: 20px;\n        }\n        .cell {\n            border: 1px solid #ccc;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 24px;\n            cursor: pointer;\n        }\n        #controls {\n            margin: 20px;\n        }\n        button {\n            font-size: 16px;\n            padding: 10px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Joy Delight Game</h1>\n    <div id="score">Score: <span id="scoreCount">0</span></div>\n    <div id="level">Level: <span id="levelCount">1</span></div>\n    <div id="game-board">\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n        <div class="cell"></div>\n    </div>\n    <div id="controls">\n        <button id="startButton">Start Game</button>\n        <button id="resetButton">Reset Game</button>\n    </div>\n    <script>\n        let score = 0;\n        let level = 1;\n        document.getElementById('startButton').addEventListener('click', startGame);\n        document.getElementById('resetButton').addEventListener('click', resetGame);\n        const cells = document.querySelectorAll('.cell');\n        cells.forEach(cell => {\n            cell.addEventListener('click', cellClicked);\n        });\n        function startGame() {\n            score = 0;\n            level = 1;\n            updateDisplay();\n            // Start the game logic here\n        }\n        function resetGame() {\n            score = 0;\n            level = 1;\n            updateDisplay();\n        }\n        function cellClicked(event) {\n            const cell = event.target;\n            // Game logic to handle cell click\n            score++;\n            if (score > 10) {\n                level++;\n                score = 0;\n            }\n            updateDisplay();\n        }\n        function updateDisplay() {\n            document.getElementById('scoreCount').textContent = score;\n            document.getElementById('levelCount').textContent = level;\n        }\n    </script>\n</body>\n</html>\n
